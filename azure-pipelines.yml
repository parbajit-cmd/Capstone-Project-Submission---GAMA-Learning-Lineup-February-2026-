trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
- name: artifactName
  value: drop
- name: vmImage
  value: ubuntu-latest
- group: lab08-secrets   # Contains UNIVERSAL_PUBLISH_PAT

stages:
# ----------------------
# CI Stage
# ----------------------
- stage: CI
  displayName: CI Build and Validate
  jobs:
  - job: BuildAndTest
    pool:
      vmImage: $(vmImage)
    steps:
    - checkout: self
      fetchDepth: 1

    - template: templates/ci-steps.yml
      parameters:
        nodeVersion: '18.x'

    - task: PublishTestResults@2
      displayName: Publish test results
      condition: succeededOrFailed()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '**/test-results.xml'
        failTaskOnFailedTests: false

    - task: PublishPipelineArtifact@1
      displayName: Publish pipeline artifact
      inputs:
        targetPath: '$(Build.SourcesDirectory)'
        artifact: '$(artifactName)'

    - script: npm audit --audit-level=high || true
      displayName: Security audit (informational)

    - task: UniversalPackages@0
      displayName: Publish shared package
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
      inputs:
        command: publish
        publishDirectory: '$(Build.SourcesDirectory)'
        feedsToUsePublish: 'internal'
        vstsFeedPublish: 'DevopsBatch04/lab08-feed'
        vstsFeedPackagePublish: 'checkout-api-drop'
        versionOption: 'patch'
# ----------------------
# Deploy to Dev
# ----------------------
- stage: Deploy_Dev
  displayName: Deploy to Dev
  dependsOn: CI
  condition: succeeded()
  jobs:
  - deployment: DevDeploy
    environment: 'lab08-dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: $(artifactName)
          - script: |
              echo "Deploying artifact to DEV"
              ls -la $(Pipeline.Workspace)
            displayName: Dev deployment simulation

# ----------------------
# Deploy to UAT
# ----------------------
- stage: Deploy_UAT
  displayName: Deploy to UAT
  dependsOn: Deploy_Dev
  condition: succeeded()
  jobs:
  - deployment: UATDeploy
    environment: 'lab08-uat'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: $(artifactName)
          - script: |
              echo "Deploying artifact to UAT"
              ls -la $(Pipeline.Workspace)
            displayName: UAT deployment simulation
